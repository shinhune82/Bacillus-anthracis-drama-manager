<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>드라마 대본 관리 - 탄저균</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .nav-tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            overflow-x: auto;
        }

        .nav-tab {
            padding: 15px 25px;
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-size: 14px;
            color: #6c757d;
            border-bottom: 3px solid transparent;
        }

        .nav-tab:hover {
            background: #e9ecef;
            color: #495057;
        }

        .nav-tab.active {
            color: #3498db;
            border-bottom-color: #3498db;
            background: white;
        }

        .tab-content {
            padding: 30px;
            min-height: 500px;
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        textarea.form-control {
            min-height: 120px;
            resize: vertical;
            font-family: 'Courier New', monospace;
            line-height: 1.6;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
        }

        .btn-warning {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
        }

        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.4);
        }

        .episode-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .episode-card {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .episode-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-color: #3498db;
        }

        .episode-card.active {
            background: #3498db;
            color: white;
            border-color: #2980b9;
        }

        .episode-card h3 {
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .episode-card p {
            font-size: 0.9em;
            opacity: 0.8;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-saved {
            background: #27ae60;
        }

        .status-modified {
            background: #f39c12;
        }

        .status-empty {
            background: #bdc3c7;
        }

        .differences-panel {
            background: #fff5f5;
            border: 1px solid #fed7d7;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .differences-panel.show {
            display: block;
        }

        .differences-list {
            list-style: none;
        }

        .differences-list li {
            padding: 8px 0;
            border-bottom: 1px solid #fed7d7;
        }

        .differences-list li:last-child {
            border-bottom: none;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        @media (max-width: 768px) {
            .container {
                margin: 0;
                border-radius: 0;
            }

            .episode-list {
                grid-template-columns: 1fr;
            }

            .nav-tabs {
                font-size: 12px;
            }

            .nav-tab {
                padding: 12px 15px;
            }
        }
    </style>
</head>
<body>

        <div class="tab-content">
            <!-- 로그라인 탭 -->
            <div class="tab-pane active" id="logline">
                <div class="form-group">
                    <label for="loglineText">📝 로그라인</label>
                    <textarea class="form-control" id="loglineText" placeholder="드라마의 핵심 내용을 한 문장으로 요약해주세요...">2015년 메르스 치료제 승인 거부로 아들을 잃고 실형을 선고받은 전 연구자가, 출소 후 코로나19 대유행 틈에 탄저균으로 관련자들을 차례로 살해하다 질병관리청장에게 "시스템을 끝까지 지킬 수 있는가?"라는 생명을 건 철학적 시험을 가하면서, 일반인의 감기 대처법을 따라가다 예상치 못한 죽음을 맞는 과정을 통해 의료진 불신과 자가진단의 위험성을 경고하는 의료 스릴러</textarea>
                </div>
                <button class="btn btn-primary" onclick="saveData('logline')">💾 저장</button>
                <button class="btn btn-success" onclick="exportData()">📤 전체 내보내기</button>
            </div>

            <!-- 기획의도 탭 -->
            <div class="tab-pane" id="purpose">
                <div class="form-group">
                    <label for="purposeText">🎯 기획의도</label>
                    <textarea class="form-control" id="purposeText" style="min-height: 300px;" placeholder="드라마 제작의 목적과 의도를 상세히 작성해주세요...">### 1. 일상적 의료 선택의 위험성 경고
누구나 경험하는 감기라는 흔한 질병을 소재로, 평범한 사람들의 일반적 대처 방식이 어떻게 치명적 결과로 이어질 수 있는지를 보여줍니다.

### 2. 팬데믹 시대 의료 시스템의 취약점 고발
코로나19 팬데믹이 남긴 상처는 여전히 현재 진행형입니다. 의료진 과부하, 진단 시스템 마비, 부검 간소화 등 당시의 의료 공백을 악용한 범죄 가능성을 제시합니다.

### 3. 시청자 참여형 미스터리 구조
시청자가 수사관이 된 기분으로 함께 추리할 수 있도록, 정보를 점진적으로 공개하는 구조를 통해 궁금증을 유발하고 해결합니다.

### 4. 시스템과 개인의 철학적 딜레마 탐구
완벽한 시스템을 고수하는 것과 인간적 유연함 사이의 딜레마를 다룹니다.

### 5. 복수와 정의의 철학적 경계선
개인적 원한에서 시작되었지만 철학적 질문으로 승화된 복수의 이야기를 통해, 그럼에도 용서받을 수 없는 악의 본질을 보여줍니다.</textarea>
                </div>
                <button class="btn btn-primary" onclick="saveData('purpose')">💾 저장</button>
            </div>

            <!-- 인물소개 탭 -->
            <div class="tab-pane" id="characters">
                <div class="form-group">
                    <label for="charactersText">👥 주요 인물 소개</label>
                    <textarea class="form-control" id="charactersText" style="min-height: 400px;" placeholder="주요 등장인물들의 상세 정보를 작성해주세요...">### 한민선 (50대, 여성)
**직업**: 질병관리청장
**성격**: 원칙주의자, 완벽주의, 융통성 부족, 시스템에 대한 절대적 신뢰
**배경**: 2015년 메르스 사태 당시 치료제 승인을 단호히 거부
**갈등**: 업무상 완벽한 시스템 수호자이면서 개인적으로는 그 시스템을 무시하는 이중성

### 서준호 (60대, 남성)  
**직업**: 은퇴한 내과의사 (한민선의 남편)
**성격**: 온화함, 경험 중심적 사고, 실용주의, 아내에 대한 깊은 애정
**역할**: 드라마의 주요 관점 인물, 시청자와 같은 눈높이에서 "일반적인 감기 대처"
**갈등**: 의사로서의 경험과 남편으로서의 감정 사이의 괴리

### 이현우 (45세, 남성)
**직업**: 질병관리청 청소직원 (가명으로 취업)
**실제 신분**: 2015년 메르스 치료제 연구자, 현재는 전과자
**복수 철학**: "당신은 끝까지 완벽하게 시스템을 지킬 수 있는가?"라는 철학적 질문
**갈등**: 동정받을 만한 과거를 가졌지만 결국 용서받을 수 없는 순수 악인</textarea>
                </div>
                <button class="btn btn-primary" onclick="saveData('characters')">💾 저장</button>
            </div>

            <!-- 시놉시스 탭 -->
            <div class="tab-pane" id="synopsis">
                <div class="form-group">
                    <label for="synopsisText">📖 전체 줄거리 (시놉시스)</label>
                    <textarea class="form-control" id="synopsisText" style="min-height: 500px;" placeholder="드라마의 전체 줄거리를 상세히 작성해주세요...">### 프롤로그: 시스템과 개인의 충돌 (2015년)
2015년 메르스 대유행 당시, 연구자 이현우는 12세 아들 준호가 메르스에 감염되어 위급한 상황이 되자 자신이 개발 중인 치료제의 긴급 사용 승인을 요청한다...

### 1막: 조용한 준비와 은밀한 복수 (2018-2022년)
2018년 출소한 이현우는 죽은 아들의 신분으로 위장하여 새로운 삶을 시작한다...

### 2막: 평범한 감기의 시작 (2024년 현재 - 1-3화)
2024년 현재, 코로나가 안정화된 시점에 이현우는 마지막이자 가장 중요한 목표인 한민선에게 접근한다...

### 3막: 예상치 못한 전개 (4-6화)
갑작스럽게 심각한 호흡곤란이 시작되어 응급실에 실려간다...

### 4막: 진실의 발견과 철학적 대결 (7-8화)
CCTV 분석과 내부 조사를 통해 범인이 평범해 보였던 청소직원 이현우임이 밝혀진다...

### 5막: 성찰과 변화 (9-10화)
사건은 사회 전체에 큰 파장을 일으킨다...</textarea>

                <button class="btn btn-primary" onclick="saveData('synopsis')">💾 저장</button>
            </div>

            <!-- 화별대본 탭 -->
            <div class="tab-pane" id="episodes">
                <div class="episode-list" id="episodeList">
                    <!-- JavaScript로 생성 -->
                </div>
                
                <div id="episodeEditor" style="display: none;">
                    <div class="form-group">
                        <label for="episodeTitle">📺 화 제목</label>
                        <input type="text" class="form-control" id="episodeTitle" placeholder="예: 제1화: 평범한 감기">
                    </div>
                    
                    <div class="form-group">
                        <label for="episodeContent">📝 대본 내용</label>
                        <textarea class="form-control" id="episodeContent" style="min-height: 500px; font-family: 'Courier New', monospace;" placeholder="대본을 작성해주세요..."></textarea>
                    </div>
                    
                    <button class="btn btn-primary" onclick="saveEpisode()">💾 저장</button>
                    <button class="btn btn-warning" onclick="backToEpisodeList()">📋 목록으로</button>
                </div>
            </div>

            <!-- 일관성체크 탭 -->
            <div class="tab-pane" id="check">
                <h2>🔍 내용 일관성 체크</h2>
                <p>로그라인, 기획의도, 인물소개, 시놉시스, 화별 내용 간의 차이점을 확인합니다.</p>
                
                <button class="btn btn-warning" onclick="checkConsistency()">🔍 일관성 검사 실행</button>
                
                <div id="consistencyResults" class="differences-panel">
                    <h3>⚠️ 발견된 차이점</h3>
                    <ul id="differencesList" class="differences-list"></ul>
                </div>
            </div>
        </div>

    <script>
        // 전역 변수
        let currentEpisode = null;
        const maxEpisodes = 10;
        let savedData = {
            logline: '',
            purpose: '',
            characters: '',
            synopsis: '',
            episodes: {}
        };

        // 초기화
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            createEpisodeList();
            setupTabNavigation();
        });

        // 탭 네비게이션 설정
        function setupTabNavigation() {
            const tabs = document.querySelectorAll('.nav-tab');
            const panes = document.querySelectorAll('.tab-pane');

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const targetTab = tab.dataset.tab;
                    
                    // 모든 탭과 패널 비활성화
                    tabs.forEach(t => t.classList.remove('active'));
                    panes.forEach(p => p.classList.remove('active'));
                    
                    // 선택된 탭과 패널 활성화
                    tab.classList.add('active');
                    document.getElementById(targetTab).classList.add('active');
                });
            });
        }

        // 에피소드 리스트 생성
        function createEpisodeList() {
            const container = document.getElementById('episodeList');
            container.innerHTML = '';

            for (let i = 1; i <= maxEpisodes; i++) {
                const episode = document.createElement('div');
                episode.className = 'episode-card';
                episode.onclick = () => editEpisode(i);

                const hasContent = savedData.episodes[i] && savedData.episodes[i].content;
                const statusClass = hasContent ? 'status-saved' : 'status-empty';
                
                episode.innerHTML = `
                    <h3><span class="status-indicator ${statusClass}"></span>${i}화</h3>
                    <p>${hasContent ? '작성완료' : '미작성'}</p>
                    ${savedData.episodes[i] ? `<small>${savedData.episodes[i].title || '제목 없음'}</small>` : ''}
                `;
                
                container.appendChild(episode);
            }
        }

        // 에피소드 편집
        function editEpisode(episodeNum) {
            currentEpisode = episodeNum;
            document.getElementById('episodeList').style.display = 'none';
            document.getElementById('episodeEditor').style.display = 'block';

            // 기존 데이터 로드
            const episode = savedData.episodes[episodeNum] || {};
            document.getElementById('episodeTitle').value = episode.title || `제${episodeNum}화: `;
            document.getElementById('episodeContent').value = episode.content || '';

            // 1화 기본 내용 설정
            if (episodeNum === 1 && !episode.content) {
                document.getElementById('episodeTitle').value = '제1화: 평범한 감기';
                document.getElementById('episodeContent').value = `# 탄저균
## 제1화: 평범한 감기

### ★ 서울시 관악구 - 한 아파트 - 저녁 (1년 전)

깔끔한 원룸 아파트. **김동현**(45, 법무부 실무관)이 책상에서 서류를 정리하고 있다. 

가벼운 기침을 하며 목을 만진다.

**김동현**  
(혼잣말)  
감기인가... 타이레놀이나 먹고 자야겠다.

약을 먹고 잠자리에 든다.

**★ 화면에 자막: "4일 후"**

같은 아파트 앞. 구급차와 경찰차가 서 있다. 검은 비닐에 싸인 시체가 실려나온다.

...`;
            }
        }

        // 에피소드 저장
        function saveEpisode() {
            if (!currentEpisode) return;

            const title = document.getElementById('episodeTitle').value;
            const content = document.getElementById('episodeContent').value;

            if (!savedData.episodes[currentEpisode]) {
                savedData.episodes[currentEpisode] = {};
            }

            savedData.episodes[currentEpisode].title = title;
            savedData.episodes[currentEpisode].content = content;

            localStorage.setItem('dramaData', JSON.stringify(savedData));
            
            showAlert('에피소드가 저장되었습니다!', 'success');
            createEpisodeList();
        }

        // 에피소드 목록으로 돌아가기
        function backToEpisodeList() {
            document.getElementById('episodeList').style.display = 'grid';
            document.getElementById('episodeEditor').style.display = 'none';
            currentEpisode = null;
        }

        // 데이터 저장
        function saveData(type) {
            const element = document.getElementById(type + 'Text');
            savedData[type] = element.value;
            localStorage.setItem('dramaData', JSON.stringify(savedData));
            showAlert('저장되었습니다!', 'success');
        }

        // 데이터 로드
        function loadData() {
            const stored = localStorage.getItem('dramaData');
            if (stored) {
                savedData = JSON.parse(stored);
                
                // UI에 데이터 반영
                if (savedData.logline) document.getElementById('loglineText').value = savedData.logline;
                if (savedData.purpose) document.getElementById('purposeText').value = savedData.purpose;
                if (savedData.characters) document.getElementById('charactersText').value = savedData.characters;
                if (savedData.synopsis) document.getElementById('synopsisText').value = savedData.synopsis;
            }
        }

        // 전체 데이터 내보내기
        function exportData() {
            const data = {
                title: '탄저균 - MBC 극본공모 작품',
                exported: new Date().toISOString(),
                ...savedData
            };

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '탄저균_드라마_대본_' + new Date().toISOString().slice(0, 10) + '.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        // 일관성 체크
        function checkConsistency() {
            const differences = [];
            
            // 인물명 체크
            const characters = extractCharacterNames(savedData.characters);
            const loglineChars = extractCharacterNames(savedData.logline);
            const synopsisChars = extractCharacterNames(savedData.synopsis);
            
            // 에피소드별 인물명 체크
            Object.values(savedData.episodes).forEach((episode, index) => {
                if (episode.content) {
                    const episodeChars = extractCharacterNames(episode.content);
                    episodeChars.forEach(char => {
                        if (!characters.includes(char)) {
                            differences.push(`${index + 1}화에 등장하는 "${char}"이(가) 인물소개에 없습니다.`);
                        }
                    });
                }
            });

            // 설정 일관성 체크
            const timelineCheck = checkTimeline();
            if (timelineCheck.length > 0) {
                differences.push(...timelineCheck);
            }

            // 결과 표시
            const resultsPanel = document.getElementById('consistencyResults');
            const differencesList = document.getElementById('differencesList');
            
            if (differences.length > 0) {
                differencesList.innerHTML = differences.map(diff => `<li>⚠️ ${diff}</li>`).join('');
                resultsPanel.classList.add('show');
            } else {
                differencesList.innerHTML = '<li>✅ 일관성 문제가 발견되지 않았습니다.</li>';
                resultsPanel.classList.add('show');
            }
        }

        // 인물명 추출 (간단한 패턴 매칭)
        function extractCharacterNames(text) {
            const matches = text.match(/\*\*([가-힣]+)\*\*/g);
            return matches ? matches.map(m => m.replace(/\*\*/g, '')) : [];
        }

        // 타임라인 체크
        function checkTimeline() {
            const issues = [];
            
            // 2015년, 2018년, 2020년 등 주요 년도가 일관되게 사용되는지 체크
            const years = ['2015', '2018', '2020', '2024'];
            const allText = [savedData.logline, savedData.purpose, savedData.characters, savedData.synopsis].join(' ');
            
            years.forEach(year => {
                const count = (allText.match(new RegExp(year, 'g')) || []).length;
                if (count > 0) {
                    // 각 에피소드에서도 같은 년도가 언급되는지 확인
                    Object.values(savedData.episodes).forEach((episode, index) => {
                        if (episode.content && episode.content.includes(year)) {
                            // 타임라인 체크 로직 (여기서는 간단히 구현)
                        }
                    });
                }
            });

            return issues;
        }

        // 알림 표시
        function showAlert(message, type = 'success') {
            // 기존 알림 제거
            const existingAlert = document.querySelector('.alert');
            if (existingAlert) {
                existingAlert.remove();
            }

            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            
            const container = document.querySelector('.tab-content');
            container.insertBefore(alert, container.firstChild);
            
            // 3초 후 자동 제거
            setTimeout(() => {
                if (alert.parentNode) {
                    alert.remove();
                }
            }, 3000);
        }

        // 자동 저장 (5분마다)
        setInterval(() => {
            const currentTab = document.querySelector('.tab-pane.active').id;
            if (currentTab !== 'episodes' && currentTab !== 'check') {
                const element = document.getElementById(currentTab + 'Text');
                if (element && element.value !== savedData[currentTab]) {
                    savedData[currentTab] = element.value;
                    localStorage.setItem('dramaData', JSON.stringify(savedData));
                }
            }
        }, 300000); // 5분
    </script>
</body>
</html>
